jenkins:
  systemMessage: "Jenkins managed by JCasC"

  numExecutors: 2


  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADMIN_ID}
          password: ${JENKINS_ADMIN_PASSWORD}

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  remotingSecurity:
    enabled: true

  clouds:
    - kubernetes:
        name: "kubernetes"
        namespace: "default"

        serverUrl: "https://kubernetes.docker.internal:6443"
        skipTlsVerify: true

        jenkinsUrl: "http://host.docker.internal:8090"

        containerCapStr: "10"

        templates:
          - name: "k8s-agent"
            label: "k8s-agent"
            namespace: "default"
            instanceCap: 5

            serviceAccount: "default"

            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest"
                workingDir: "/home/jenkins/agent"

                args: "^${computer.jnlpmac} ^${computer.name}"

                resourceRequestCpu: "200m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"

unclassified:
  location:
    url: "http://host.docker.internal:8090/"

tool:
  git:
    installations:
      - name: git
        home: /usr/bin/git

jobs:
  - script: >
      pipelineJob('hello-pipeline') {
        definition {
          cps {
            script("""
              pipeline {
                agent {
                  label 'k8s-agent'
                }

                stages {
                  stage('Hello') {
                    steps {
                      echo 'Hello from Kubernetes JNLP agent'
                      sh 'hostname'
                      sh 'cat /etc/os-release'
                    }
                  }
                }
              }
            """.stripIndent())
            sandbox()
          }
        }
      }

