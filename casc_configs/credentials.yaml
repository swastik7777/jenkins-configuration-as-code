credentials:
  system:
    domainCredentials:
      - credentials:

          - usernamePassword:
              id: github-creds
              username: ${GITHUB_USER}
              password: ${GITHUB_TOKEN}
              scope: GLOBAL

          - string:
              id: k8s-token
              secret: "create ur k8s-token "
              scope: GLOBAL
              description: Kubernetes token
