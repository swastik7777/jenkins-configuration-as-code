version: "3.9"

services:

  jenkins:

    build: .

    container_name: jenkins-local

    restart: unless-stopped

    ports:
      - "8090:8080"

    environment:
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc_configs/jenkins.yaml

      JAVA_OPTS: >
        -Djenkins.install.runSetupWizard=false
        -Dhudson.remoting.Launcher.disableHttpsCertificateCheck=true

      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}

      JENKINS_DEV_ID: ${JENKINS_DEV_ID}
      JENKINS_DEV_PASSWORD: ${JENKINS_DEV_PASSWORD}

      JENKINS_QA_ID: ${JENKINS_QA_ID}
      JENKINS_QA_PASSWORD: ${JENKINS_QA_PASSWORD}

      GITHUB_USER: ${GITHUB_USER}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - jenkins_data:/var/jenkins_home
      - ./casc_configs:/var/jenkins_home/casc_configs
      - ./jobs:/var/jenkins_home/jobs
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_data:
